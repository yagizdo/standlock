name: StandLock
options:
  bundleIdPrefix: com.yagizdokumaci
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: F475N5N7V6

packages:
  StandLockKit:
    path: StandLockKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  StandLock:
    type: application
    platform: macOS
    sources:
      - path: StandLock
    settings:
      base:
        INFOPLIST_FILE: StandLock/Info.plist
        CODE_SIGN_ENTITLEMENTS: StandLock/StandLock.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.yagizdokumaci.standlock
        PRODUCT_NAME: StandLock
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: StandLockKit
        product: StandLockCore
      - package: StandLockKit
        product: Scheduling
      - package: StandLockKit
        product: Detection
      - package: StandLockKit
        product: Locking
      - package: StandLockKit
        product: Coordination
      - package: Sparkle
        product: Sparkle
