name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SCHEME: StandLock
  TEAM_ID: F475N5N7V6

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Extract build number from Info.plist
        run: |
          BUILD_NUM=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" StandLock/Info.plist)
          echo "BUILD_NUMBER=${BUILD_NUM}" >> "$GITHUB_ENV"

      # ── Signing & Notarization Setup ──

      - name: Setup keychain and import certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: scripts/setup-keychain.sh

      - name: Setup notarization credentials
        env:
          P8_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          P8_PATH="$RUNNER_TEMP/api-key.p8"
          echo "$P8_KEY" > "$P8_PATH"
          xcrun notarytool store-credentials "ci-notary" \
            --key "$P8_PATH" --key-id "$KEY_ID" --issuer "$ISSUER_ID"

      # ── Build ──

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project StandLock.xcodeproj -scheme "$SCHEME" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData"

      - name: Archive
        run: |
          xcodebuild archive \
            -project StandLock.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/StandLock.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export archive
        run: |
          cat > "$RUNNER_TEMP/export-options.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>F475N5N7V6</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/StandLock.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/export-options.plist"

      # ── Sign & Notarize ──

      - name: Fix Sparkle framework symlinks
        run: scripts/fix-sparkle-symlinks.sh

      - name: Re-sign app and frameworks
        run: scripts/resign-app.sh

      - name: Notarize and staple
        run: scripts/notarize.sh

      # ── Package ──

      - name: Create release ZIP and checksum
        run: scripts/create-release-zip.sh

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: scripts/generate-appcast.sh

      # ── Release ──

      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## StandLock v'"${VERSION}"'/{found=1} found&&/^## /&&!/^## StandLock v'"${VERSION}"'/{exit} found{print}' \
            CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s "$RUNNER_TEMP/release-notes.md" ]; then
            NOTES_ARGS=(--notes-file "$RUNNER_TEMP/release-notes.md")
          else
            NOTES_ARGS=(--generate-notes)
          fi
          gh release create "v${VERSION}" \
            --title "StandLock v${VERSION}" \
            "${NOTES_ARGS[@]}" \
            "StandLock-${VERSION}.zip" \
            "StandLock-${VERSION}.zip.sha256" \
            appcast.xml

      - name: Update Homebrew cask
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: scripts/update-homebrew-cask.sh
